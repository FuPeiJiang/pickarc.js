name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14

jobs:
  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: macOS arm64
            os: macos-15
          - name: macOS x64
            os: macos-15-intel
          - name: Windows
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Typecheck
        run: bun run typecheck

  alpine:
    name: Alpine Linux
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run tests in Alpine
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            "oven/bun:${BUN_VERSION}-alpine" \
            sh -euxc 'bun install --frozen-lockfile && bun test && bun run typecheck'

  android:
    name: Android Termux
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Configure Android SDK path
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$sdk_root" ]; then
            sdk_root=/opt/android-sdk
          fi
          sudo mkdir -p "$sdk_root"
          sudo chown -R "$USER:$(id -gn)" "$sdk_root"
          echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"

      - name: Enable KVM
        run: |
          sudo mkdir -p /etc/udev/rules.d
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          if command -v udevadm >/dev/null 2>&1; then
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
          fi
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
          fi

      - name: Run tests in Termux
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 36
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-snapshot
            -camera-back none
          script: bash .github/scripts/android-termux-ci.sh
