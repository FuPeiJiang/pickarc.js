name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14

jobs:
  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: macOS arm64
            os: macos-15
          - name: macOS x64
            os: macos-15-intel
          - name: Windows
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Typecheck
        run: bun run typecheck

  alpine:
    name: Alpine Linux
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests in Alpine
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            "oven/bun:${BUN_VERSION}-alpine" \
            sh -euxc 'bun install --frozen-lockfile && bun test && bun run typecheck'

  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Explain Android status
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          Native Android tests are not run because Bun does not publish Android runtime builds.

          pickarc's test suite requires Bun APIs such as `bun:test` and `bun:ffi`.
          The covered hosted CI targets are therefore:

          - macOS arm64
          - macOS x64
          - Ubuntu Linux glibc
          - Alpine Linux musl
          - Windows
          EOF
